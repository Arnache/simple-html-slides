<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link href="slide.css" rel="stylesheet" />
  </head>
  <body>
    <div class="main">
      <div class="box" style="max-width: 60vw;">
        <h1>A slide title</h1>
        <p>
          Some text
        </p>
        <p>
          A list:
          <ul>
            <li>Press Arrow Right/Left to reveal/hide items</li>
            <li><span  class="reveal">A second item</span></li>
            <li class="reveal">A surprise item. Now Arrow Right passes to the next slide.</li>
          </ul>
        </p>
        <p>
          Press PageDown key to directly go to next slide. 
        </p>
      </div>
    </div>
  </body>
  <script src="pages.js"></script>
</html>
